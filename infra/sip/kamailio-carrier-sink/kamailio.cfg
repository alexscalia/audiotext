#!KAMAILIO
#
# Fake carrier sink. Accepts any INVITE and replies 200 OK statelessly.
# No SDP, no media — just enough to prove the edge dispatcher works.

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
log_prefix="{sink $rm $hdr(CSeq) $ci} "

children=2
fork=yes

listen=udp:0.0.0.0:5060

####### Modules #########

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "kex.so"
loadmodule "xlog.so"
loadmodule "sanity.so"

####### Routing Logic #########

request_route {

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "[sink] malformed request from $si:$sp\n");
        exit;
    }

    xlog("L_INFO", "[sink] $rm from $si:$sp to $ru, body-len=$cl\n");

    if (has_totag()) {
        if (loose_route()) {
            t_relay();
            exit;
        }
    }

    if (is_method("INVITE")) {
        sl_send_reply("100", "Trying");
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("ACK")) {
        exit;
    }

    if (is_method("BYE")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}
