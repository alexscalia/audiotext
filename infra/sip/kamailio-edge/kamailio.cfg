#!KAMAILIO
#
# Edge proxy — receives INVITEs, dispatches to a carrier from set 1.
# Smoke-test config: one carrier (the in-network sink). No auth, no NAT, no media.

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
log_prefix="{edge $rm $hdr(CSeq) $ci} "

children=4
fork=yes

listen=udp:0.0.0.0:5060

####### Modules #########

loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "sl.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "dispatcher.so"

# dispatcher
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

####### Routing Logic #########

request_route {

    # max-forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # sanity
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "[edge] malformed request from $si:$sp\n");
        exit;
    }

    xlog("L_INFO", "[edge] $rm from $si:$sp to $ru\n");

    # in-dialog requests (ACK, BYE, re-INVITE)
    if (has_totag()) {
        if (loose_route()) {
            t_relay();
            exit;
        }
        # No Route header (sink omits Contact/Record-Route in 200 OK).
        # Just absorb BYE/CANCEL gracefully so test rigs don't fail at teardown.
        if (is_method("BYE") || is_method("CANCEL")) {
            sl_send_reply("200", "OK");
            exit;
        }
        if (is_method("ACK")) {
            exit;
        }
    }

    # only INVITE is dispatched in this slice
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # record-route so BYE comes back here
    record_route();

    # pick a carrier from dispatcher set 1, alg 4 = round-robin
    if (!ds_select_dst("1", "4")) {
        xlog("L_WARN", "[edge] no destination in dispatcher set 1\n");
        sl_send_reply("503", "No carrier available");
        exit;
    }

    xlog("L_INFO", "[edge] forwarding to $du\n");

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
