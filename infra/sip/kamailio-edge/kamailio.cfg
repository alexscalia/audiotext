#!KAMAILIO
#
# Edge proxy — receives INVITEs, dispatches to a carrier from set 1.
# Smoke-test config: one carrier (the in-network sink). No auth, no NAT, no media.

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
log_prefix="{edge $rm $hdr(CSeq) $ci} "

children=4
fork=yes

listen=udp:0.0.0.0:5060

####### Modules #########

loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "sl.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "dispatcher.so"
loadmodule "http_client.so"
loadmodule "jansson.so"

# dispatcher
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")

# http_client — short timeouts; the Zig signaling service is in-network.
modparam("http_client", "connection_timeout", 1)
modparam("http_client", "keep_connections", 1)

####### Routing Logic #########

request_route {

    # max-forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # sanity
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "[edge] malformed request from $si:$sp\n");
        exit;
    }

    xlog("L_INFO", "[edge] $rm from $si:$sp to $ru\n");

    # in-dialog requests (ACK, BYE, re-INVITE)
    if (has_totag()) {
        if (loose_route()) {
            t_relay();
            exit;
        }
        # No Route header (sink omits Contact/Record-Route in 200 OK).
        # Just absorb BYE/CANCEL gracefully so test rigs don't fail at teardown.
        if (is_method("BYE") || is_method("CANCEL")) {
            sl_send_reply("200", "OK");
            exit;
        }
        if (is_method("ACK")) {
            exit;
        }
    }

    # only INVITE is dispatched in this slice
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Authorization — query Zig signaling service.
    # Passes source IP, A-number ($fU = From user), B-number ($rU = R-URI user).
    # Rejects unknown / inactive carrier IPs with Q.850 cause 34.
    $var(auth_url) = "http://sip-signaling:8080/authorize?ip=" + $si
                     + "&a=" + $(fU{s.escape.param})
                     + "&b=" + $(rU{s.escape.param});
    if (!http_client_query("$var(auth_url)", "$var(auth_body)")) {
        xlog("L_ERR", "[edge] signaling service unreachable for $si\n");
        append_to_reply("Reason: Q.850;cause=41;text=\"Temporary Failure\"\r\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }
    # Signaling response: { allowed: 0|1, status?: int, cause?: int }
    # status + cause only present when allowed == 0; chosen by Zig per policy.
    $var(allowed) = 0;
    $var(status) = 503;
    $var(cause) = 34;
    jansson_get("allowed", "$var(auth_body)", "$var(allowed)");
    jansson_get("status",  "$var(auth_body)", "$var(status)");
    jansson_get("cause",   "$var(auth_body)", "$var(cause)");
    if ($var(allowed) != 1) {
        xlog("L_NOTICE", "[edge] reject $si — $var(status), Q.850;cause=$var(cause)\n");
        append_to_reply("Reason: Q.850;cause=$var(cause)\r\n");
        if ($var(status) == 403) {
            sl_send_reply("403", "Forbidden");
        } else {
            sl_send_reply("503", "Service Unavailable");
        }
        exit;
    }

    # Accept path — rewrite R-URI with the tech-prefix-stripped B-number
    # so downstream (dispatcher / FreeSWITCH) sees the clean destination.
    $var(stripped_b) = "";
    jansson_get("b", "$var(auth_body)", "$var(stripped_b)");
    if ($(var(stripped_b){s.len}) > 0) {
        xlog("L_INFO", "[edge] auth ok $si — $rU -> $var(stripped_b)\n");
        $rU = $var(stripped_b);
    }

    # record-route so BYE comes back here
    record_route();

    # pick a carrier from dispatcher set 1, alg 4 = round-robin
    if (!ds_select_dst("1", "4")) {
        xlog("L_WARN", "[edge] no destination in dispatcher set 1\n");
        sl_send_reply("503", "No carrier available");
        exit;
    }

    xlog("L_INFO", "[edge] forwarding to $du\n");

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
